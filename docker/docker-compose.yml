version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: image-morph
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/image_morph.db
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DEBUG=false
      - MAX_FILE_SIZE=10485760
      # Cloudflare R2 Configuration (optional)
      - R2_ENDPOINT_URL=${R2_ENDPOINT_URL:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-image-morph}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this-in-production}
    volumes:
      - image_data:/app/data
      - image_temp:/app/temp
    networks:
      - image_morph_network

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: image-morph-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - image_morph_network
    profiles:
      - with-nginx

volumes:
  image_data:
  image_temp:

networks:
  image_morph_network:
    driver: bridge
